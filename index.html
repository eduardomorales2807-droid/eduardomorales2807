<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner QR con Historial</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <div class="max-w-md mx-auto p-4">
        <header class="text-center my-6">
            <h1 class="text-2xl font-bold text-blue-600">Lector de Códigos QR</h1>
            <p class="text-sm text-gray-500">Escanea y almacena registros con fecha y hora</p>
        </header>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 text-center">
            <button id="btn-toggle" onclick="alternarCamara()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition shadow flex items-center justify-center gap-2">
                <span>📷</span> <span id="txt-boton">Activar Cámara</span>
            </button>
            
            <div id="contenedor-camara" class="hidden mt-4 border-2 border-dashed border-gray-300 rounded-lg p-2 bg-black">
                <div id="lector-qr" class="w-full overflow-hidden rounded-md"></div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-lg font-bold text-gray-700">Datos Guardados</h2>
                <button onclick="limpiarHistorial()" class="text-xs text-red-500 hover:underline font-medium">
                    Limpiar todo
                </button>
            </div>

            <div id="lista-registros" class="space-y-3 max-h-[400px] overflow-y-auto pr-1">
                <p id="sin-datos" class="text-sm text-gray-400 text-center py-4">No hay códigos escaneados aún.</p>
            </div>
        </div>
    </div>

    <script>
        let html5QrCode = null;
        let camaraActiva = false;
        // Cargar datos existentes o iniciar array vacío
        let registros = JSON.parse(localStorage.getItem('qr_registros')) || [];

        // Al cargar la página, dibujar el historial si tiene datos
        document.addEventListener("DOMContentLoaded", actualizarVistaHistorial);

        function alternarCamara() {
            const contenedor = document.getElementById('contenedor-camara');
            const txtBoton = document.getElementById('txt-boton');
            const btnToggle = document.getElementById('btn-toggle');

            if (!camaraActiva) {
                // Encender cámara
                contenedor.classList.remove('hidden');
                txtBoton.innerText = "Apagar Cámara";
                btnToggle.classList.replace('bg-blue-600', 'bg-red-500');
                btnToggle.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');

                html5QrCode = new Html5Qrcode("lector-qr");
                
                // Configuración: 10 fotogramas por segundo y cuadro de enfoque de 250px
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };

                // "environment" fuerza el uso de la cámara trasera en móviles
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    (textoQr) => {
                        // Código ejecutado al detectar un QR con éxito
                        guardarRegistro(textoQr);
                        // Apagamos la cámara tras una lectura exitosa para evitar lecturas duplicadas en bucle
                        alternarCamara();
                        // Alerta nativa rápida
                        alert("¡Código QR detectado correctamente!");
                    },
                    (error) => {
                        // Error de escaneo continuo (se ignora para no saturar la consola)
                    }
                ).catch((err) => {
                    console.error("Error al iniciar cámara: ", err);
                    alert("No se pudo acceder a la cámara. Asegúrate de dar los permisos correspondientes.");
                    alternarCamara();
                });

                camaraActiva = true;
            } else {
                // Apagar cámara
                if (html5QrCode) {
                    html5QrCode.stop().then(() => {
                        contenedor.classList.add('hidden');
                        txtBoton.innerText = "Activar Cámara";
                        btnToggle.classList.replace('bg-red-500', 'bg-blue-600');
                        btnToggle.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
                        camaraActiva = false;
                    }).catch(err => console.error("Error al detener cámara", err));
                }
            }
        }

        function guardarRegistro(texto) {
            const ahora = new Date();
            
            // Dar formato legible a la fecha y hora
            const fecha = ahora.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const hora = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const nuevoRegistro = {
                texto: texto,
                fecha: fecha,
                hora: hora,
                timestamp: ahora.getTime()
            };

            // Insertar al inicio para que el más reciente salga primero
            registros.unshift(nuevoRegistro);
            
            // Guardar en la memoria local del dispositivo
            localStorage.setItem('qr_registros', JSON.stringify(registros));
            
            actualizarVistaHistorial();
        }

        function actualizarVistaHistorial() {
            const lista = document.getElementById('lista-registros');
            const sinDatos = document.getElementById('sin-datos');

            if (registros.length === 0) {
                sinDatos.classList.remove('hidden');
                // Limpiar elementos viejos dejando solo el mensaje
                lista.innerHTML = '';
                lista.appendChild(sinDatos);
                return;
            }

            sinDatos.classList.add('hidden');
            lista.innerHTML = '';

            registros.forEach(reg => {
                lista.innerHTML += `
                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 text-sm">
                        <div class="font-mono text-gray-700 break-all bg-white p-2 rounded border border-gray-100 mb-2 select-all">
                            ${escapeHTML(reg.texto)}
                        </div>
                        <div class="flex justify-between text-xs text-gray-400 font-medium">
                            <span>📅 ${reg.fecha}</span>
                            <span>⏰ ${reg.hora}</span>
                        </div>
                    </div>
                `;
            });
        }

        function limpiarHistorial() {
            if (confirm("¿Estás seguro de que deseas borrar todo el historial guardado?")) {
                registros = [];
                localStorage.removeItem('qr_registros');
                actualizarVistaHistorial();
            }
        }

        // Función de seguridad para evitar que códigos maliciosos rompan el HTML del historial
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
