<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Escolar Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .fc-event { cursor: pointer; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div class="container mx-auto p-4 max-w-7xl">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm gap-4">
            <div>
                <h1 class="text-2xl font-bold text-indigo-700">Sistema de Gestión de Estudiantes</h1>
                <p class="text-sm text-gray-500">Control de Alumnos, Asistencias por QR y Calendario</p>
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="abrirFormularioEstudiante()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded shadow text-sm font-medium transition">
                    + Nuevo Estudiante
                </button>
                <button onclick="escanearQR()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow text-sm font-medium transition flex items-center gap-1">
                    📷 Escanear QR Asistencia
                </button>
                <button onclick="exportarBackup()" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded shadow text-sm font-medium transition">
                    💾 Exportar Backup (JS)
                </button>
            </div>
        </header>

        <div id="qr-reader-container" class="hidden mb-6 bg-white p-4 rounded-lg shadow-md max-w-md mx-auto">
            <h3 class="text-lg font-bold mb-2 text-center text-gray-700">Escanear Código QR del Estudiante</h3>
            <div id="qr-reader" class="w-full"></div>
            <button onclick="cerrarEscaneoQR()" class="w-full mt-2 bg-red-500 text-white py-1 rounded text-sm">Cancelar Escaneo</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-4 rounded-lg shadow-sm overflow-hidden">
                <h2 class="text-xl font-bold mb-4 text-gray-700 border-b pb-2">Listado de Estudiantes</h2>
                <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-sm">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr>
                                <th class="px-3 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">DNI</th>
                                <th class="px-3 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">Estudiante</th>
                                <th class="px-3 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">Gen / Edad</th>
                                <th class="px-3 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">Teléfono</th>
                                <th class="px-3 py-3 text-center font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-estudiantes" class="bg-white divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-4 rounded-lg shadow-sm">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold text-gray-700">Calendario de Asistencias</h2>
                    <button onclick="registrarAsistenciaManual()" class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-2 py-1 rounded text-xs font-semibold">
                        + Registro Manual
                    </button>
                </div>
                <div id="calendar" class="text-xs"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. BANCO DE DATOS INICIAL (20 Registros solicitados) ---
        const estudiantesIniciales = [
            { dni: "70123456", nombres: "Carlos Alberto", apellidos: "Mendoza Ruiz", genero: "Masculino", edad: 19, telefono: "987654321" },
            { dni: "71234567", nombres: "Ana Sofía", apellidos: "Benítez Castro", genero: "Femenino", edad: 21, telefono: "912345678" },
            { dni: "72345678", nombres: "Luis Fernando", apellidos: "Quispe Flores", genero: "Masculino", edad: 20, telefono: "923456789" },
            { dni: "73456789", nombres: "María Fernanda", apellidos: "Gómez Salazar", genero: "Femenino", edad: 18, telefono: "934567890" },
            { dni: "74567890", nombres: "Javier Alejandro", apellidos: "Torres Vega", genero: "Masculino", edad: 22, telefono: "945678901" },
            { dni: "75678901", nombres: "Camila Belén", apellidos: "Ramírez Diaz", genero: "Femenino", edad: 19, telefono: "956789012" },
            { dni: "76789012", nombres: "Diego Alonso", Morales: "Soto", apellidos: "Morales Soto", genero: "Masculino", edad: 23, telefono: "967890123" },
            { dni: "77890123", nombres: "Valeria Lucía", apellidos: "Peralta Cruz", genero: "Femenino", edad: 20, telefono: "978901234" },
            { dni: "78901234", nombres: "Mateo Nicolás", apellidos: "Villanueva Rey", genero: "Masculino", edad: 21, telefono: "989012345" },
            { dni: "40123456", nombres: "Claudia Inés", apellidos: "Gutiérrez Arce", genero: "Femenino", edad: 22, telefono: "911223344" },
            { dni: "41234567", nombres: "Gonzalo André", apellidos: "Chávez Palacios", genero: "Masculino", edad: 18, telefono: "922334455" },
            { dni: "42345678", nombres: "Daniela Alejandra", apellidos: "Silva Paredes", genero: "Femenino", edad: 20, telefono: "933445566" },
            { dni: "43456789", nombres: "Rodrigo Josué", apellidos: "Espinoza León", genero: "Masculino", edad: 24, telefono: "944556677" },
            { dni: "44567890", nombres: "Andrea Carolina", apellidos: "Castillo Meza", genero: "Femenino", edad: 19, telefono: "955667788" },
            { dni: "45678901", nombres: "Sebastián Omar", apellidos: "Navarro Ríos", genero: "Masculino", edad: 21, telefono: "966778899" },
            { dni: "46789012", nombres: "Natalia Isabel", apellidos: "Vargas Delgado", genero: "Femenino", edad: 20, telefono: "977889900" },
            { dni: "47890123", nombres: "Franco David", apellidos: "Medina Rojas", genero: "Masculino", edad: 22, telefono: "988990011" },
            { dni: "48901234", nombres: "Luciana Beatriz", apellidos: "Campos Fuentes", genero: "Femenino", edad: 18, telefono: "919283746" },
            { dni: "49012345", nombres: "Renato Gabriel", apellidos: "Alva Guerrero", genero: "Masculino", edad: 23, telefono: "928374651" },
            { dni: "70987654", nombres: "Mariana de los Ángeles", apellidos: "Ramos Paredes", genero: "Femenino", edad: 21, telefono: "937465182" }
        ];

        // --- 2. INICIALIZACIÓN DE VARIABLES ---
        let estudiantes = JSON.parse(localStorage.getItem('estudiantes')) || estudiantesIniciales;
        let asistencias = JSON.parse(localStorage.getItem('asistencias')) || [];
        let calendar;
        let html5QrCode;

        document.addEventListener('DOMContentLoaded', function() {
            guardarLocalStorage();
            renderEstudiantes();
            initCalendar();
        });

        function guardarLocalStorage() {
            localStorage.setItem('estudiantes', JSON.stringify(estudiantes));
            localStorage.setItem('asistencias', JSON.stringify(asistencias));
        }

        // --- 3. CRUD DE ESTUDIANTES CON SWEETALERT2 ---
        function renderEstudiantes() {
            const tbody = document.getElementById('tabla-estudiantes');
            tbody.innerHTML = '';
            estudiantes.forEach((est, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-3 py-3 whitespace-nowrap font-mono text-xs">${est.dni}</td>
                        <td class="px-3 py-3">
                            <div class="font-medium text-gray-900">${est.apellidos}</div>
                            <div class="text-xs text-gray-500">${est.nombres}</div>
                        </td>
                        <td class="px-3 py-3 text-xs text-gray-600">${est.genero}<br><span class="text-gray-400">${est.edad} años</span></td>
                        <td class="px-3 py-3 text-xs font-mono text-gray-600">${est.telefono}</td>
                        <td class="px-3 py-3 text-center text-xs font-medium space-x-1">
                            <button onclick="abrirFormularioEstudiante(${index})" class="text-indigo-600 hover:text-indigo-900 bg-indigo-50 px-2 py-1 rounded">Editar</button>
                            <button onclick="eliminarEstudiante(${index})" class="text-red-600 hover:text-red-900 bg-red-50 px-2 py-1 rounded">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function abrirFormularioEstudiante(index = null) {
            const esEdicion = index !== null;
            const est = esEdicion ? estudiantes[index] : { dni: '', nombres: '', apellidos: '', genero: 'Masculino', edad: '', telefono: '' };

            const { value: formValues } = await Swal.fire({
                title: esEdicion ? 'Editar Estudiante' : 'Registrar Nuevo Estudiante',
                html: `
                    <input id="swal-dni" class="swal2-input" placeholder="DNI" value="${est.dni}" ${esEdicion ? 'disabled' : ''}>
                    <input id="swal-nombres" class="swal2-input" placeholder="Nombres" value="${est.nombres}">
                    <input id="swal-apellidos" class="swal2-input" placeholder="Apellidos" value="${est.apellidos}">
                    <select id="swal-genero" class="swal2-input">
                        <option value="Masculino" ${est.genero === 'Masculino' ? 'selected' : ''}>Masculino</option>
                        <option value="Femenino" ${est.genero === 'Femenino' ? 'selected' : ''}>Femenino</option>
                    </select>
                    <input id="swal-edad" type="number" class="swal2-input" placeholder="Edad" value="${est.edad}">
                    <input id="swal-telefono" class="swal2-input" placeholder="Teléfono" value="${est.telefono}">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Guardar',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const dni = document.getElementById('swal-dni').value.trim();
                    const nombres = document.getElementById('swal-nombres').value.trim();
                    const apellidos = document.getElementById('swal-apellidos').value.trim();
                    const genero = document.getElementById('swal-genero').value;
                    const edad = document.getElementById('swal-edad').value;
                    const telefono = document.getElementById('swal-telefono').value.trim();

                    if (!dni || !nombres || !apellidos || !edad || !telefono) {
                        Swal.showValidationMessage('Todos los campos son obligatorios');
                        return false;
                    }
                    if(!esEdicion && estudiantes.some(e => e.dni === dni)) {
                        Swal.showValidationMessage('El DNI ya se encuentra registrado');
                        return false;
                    }
                    return { dni, nombres, apellidos, genero, edad: parseInt(edad), telefono };
                }
            });

            if (formValues) {
                if (esEdicion) {
                    estudiantes[index] = { ...formValues, dni: est.dni }; // Mantiene el DNI original
                    Swal.fire('¡Actualizado!', 'Los datos se modificaron correctamente.', 'success');
                } else {
                    estudiantes.push(formValues);
                    Swal.fire('¡Registrado!', 'Estudiante agregado a la lista.', 'success');
                }
                guardarLocalStorage();
                renderEstudiantes();
            }
        }

        function eliminarEstudiante(index) {
            Swal.fire({
                title: '¿Estás seguro?',
                text: `Se borrará a ${estudiantes[index].nombres} ${estudiantes[index].apellidos}. Esta acción no se puede deshacer.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    estudiantes.splice(index, 1);
                    guardarLocalStorage();
                    renderEstudiantes();
                    Swal.fire('Eliminado', 'El estudiante ha sido removido.', 'success');
                }
            });
        }

        // --- 4. GESTIÓN DE CALENDARIO Y ASISTENCIAS ---
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                headerToolbar: { left: 'prev,next', center: 'title', right: '' },
                events: obtenerEventosAsistencia(),
                eventClick: function(info) {
                    gestionarAsistenciaInteractiva(info.event.id);
                }
            });
            calendar.render();
        }

        function obtenerEventosAsistencia() {
            return asistencias.map(asist => {
                const est = estudiantes.find(e => e.dni === asist.dni);
                const nombreCompleto = est ? `${est.apellidos}, ${est.nombres.split(' ')[0]}` : `DNI: ${asist.dni}`;
                return {
                    id: asist.id,
                    title: `✅ ${nombreCompleto}`,
                    start: asist.fecha,
                    color: '#10B981' // Esmeralda
                };
            });
        }

        function refrescarCalendario() {
            calendar.removeAllEvents();
            calendar.addEventSource(obtenerEventosAsistencia());
        }

        // Registrar asistencia (Core lógico)
        function procesarRegistroAsistencia(dni, fechaSeleccionada = null) {
            const est = estudiantes.find(e => e.dni === dni);
            if (!est) {
                Swal.fire('Error', `No se encontró ningún alumno con el DNI: ${dni}`, 'error');
                return false;
            }

            const hoy = fechaSeleccionada || new Date().toISOString().split('T')[0];
            
            // Validar duplicado
            const yaAsistio = asistencias.some(a => a.dni === dni && a.fecha === hoy);
            if (yaAsistio) {
                Swal.fire('Aviso', `${est.nombres} ya tiene una asistencia registrada para el día ${hoy}.`, 'info');
                return false;
            }

            const nuevaAsistencia = {
                id: 'asist_' + Date.now() + Math.random().toString(36).substr(2, 5),
                dni: dni,
                fecha: hoy
            };

            asistencias.push(nuevaAsistencia);
            guardarLocalStorage();
            refrescarCalendario();
            Swal.fire('Asistencia Grabada', `${est.nombres} ${est.apellidos} marcado presente.`, 'success');
            return true;
        }

        // Interactivo: Crear asistencia manual por formulario
        async function registrarAsistenciaManual() {
            let opcionesAlumnos = {};
            estudiantes.forEach(e => {
                opcionesAlumnos[e.dni] = `${e.apellidos}, ${e.nombres} (${e.dni})`;
            });

            const hoy = new Date().toISOString().split('T')[0];

            const { value: formValues } = await Swal.fire({
                title: 'Registro de Asistencia Manual',
                html: `
                    <label class="block text-left text-xs text-gray-500 mb-1">Selecciona Estudiante:</label>
                    <select id="asist-dni" class="swal2-input" style="width:85%">
                        ${Object.entries(opcionesAlumnos).map(([dni, nom]) => `<option value="${dni}">${nom}</option>`).join('')}
                    </select>
                    <label class="block text-left text-xs text-gray-500 mt-3 mb-1">Fecha de Asistencia:</label>
                    <input id="asist-fecha" type="date" class="swal2-input" style="width:85%" value="${hoy}">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Registrar',
                cancelButtonText: 'Cerrar',
                preConfirm: () => {
                    return {
                        dni: document.getElementById('asist-dni').value,
                        fecha: document.getElementById('asist-fecha').value
                    }
                }
            });

            if (formValues) {
                procesarRegistroAsistencia(formValues.dni, formValues.fecha);
            }
        }

        // Interactivo: Editar/Eliminar asistencia desde el Calendario
        async function gestionarAsistenciaInteractiva(asistenciaId) {
            const idx = asistencias.findIndex(a => a.id === asistenciaId);
            if (idx === -1) return;

            const asist = asistencias[idx];
            const est = estudiantes.find(e => e.dni === asist.dni);

            const { value: action } = await Swal.fire({
                title: 'Gestionar Asistencia',
                text: `Alumno: ${est ? est.nombres + ' ' + est.apellidos : asist.dni} | Fecha: ${asist.fecha}`,
                icon: 'question',
                showCancelButton: true,
                showDenyButton: true,
                confirmButtonText: 'Cambiar Fecha',
                denyButtonText: 'Eliminar Asistencia',
                cancelButtonText: 'Volver',
                confirmButtonColor: '#4F46E5',
                denyButtonColor: '#EF4444'
            });

            if (action) { // Cambiar fecha
                const { value: nuevaFecha } = await Swal.fire({
                    title: 'Selecciona nueva fecha',
                    input: 'date',
                    inputValue: asist.fecha,
                    showCancelButton: true
                });
                if (nuevaFecha) {
                    asistencias[idx].fecha = nuevaFecha;
                    guardarLocalStorage();
                    refrescarCalendario();
                    Swal.fire('Modificado', 'Fecha de asistencia actualizada.', 'success');
                }
            } else if (Swal.getMainButtonsMatch?.() || action === false) { 
                // SweetAlert dispara Deny en el bloque correspondiente
            }
        }

        // Manejador del trigger Deny de Sweetalert2 para eliminar
        document.addEventListener('click', function(e){
            // Parche dinámico para capturar el botón Deny del modal de gestión de asistencias
            if(e.target && e.target.classList.contains('swal2-deny')){
                const tituloVisible = document.getElementById('swal2-title')?.innerText;
                if(tituloVisible === 'Gestionar Asistencia'){
                    const textoEst = document.getElementById('swal2-html-container')?.innerText || '';
                    // Buscar coincidencia en asistencias mediante fuerza bruta limpia
                    const asistEncontrada = asistencias.find(a => textoEst.includes(a.fecha));
                    if(asistEncontrada){
                        asistencias = asistencias.filter(a => a.id !== asistEncontrada.id);
                        guardarLocalStorage();
                        refrescarCalendario();
                        Swal.close();
                        Swal.fire('Eliminado', 'El registro de asistencia fue removido.', 'success');
                    }
                }
            }
        });


        // --- 5. LECTOR DE CÓDIGOS QR (MÓVIL / CÁMARA) ---
        function escanearQR() {
            const contenedor = document.getElementById('qr-reader-container');
            contenedor.classList.remove('hidden');

            html5QrCode = new Html5Qrcode("qr-reader");
            
            // Configuración óptima para teléfonos móviles (usa la cámara trasera si está disponible)
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (qrText) => {
                    // Al leer con éxito el QR (debe contener únicamente el número de DNI)
                    cerrarEscaneoQR();
                    procesarRegistroAsistencia(qrText.trim());
                },
                (errorMessage) => {
                    // Error de escaneo continuo (ignorar para evitar spam de alertas log)
                }
            ).catch((err) => {
                Swal.fire('Error de Cámara', 'No se pudo acceder a la cámara del dispositivo móvil.', 'error');
                contenedor.classList.add('hidden');
            });
        }

        function cerrarEscaneoQR() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('qr-reader-container').classList.add('hidden');
                }).catch(err => {
                    document.getElementById('qr-reader-container').classList.add('hidden');
                });
            }
        }

        // --- 6. EXPORTAR RESPALDO BACKUP (ARCHIVO .JS) ---
        function exportarBackup() {
            const datosBackup = {
                fechaExportacion: new Date().toLocaleString(),
                estudiantes: estudiantes,
                asistencias: asistencias
            };

            // Creamos un string ejecutable o legible estructurado en formato JS
            const contenidoArchivo = `/** BACKUP SISTEMA GESTIÓN ESCOLAR **/\nconst BACKUP_DATA = ${JSON.stringify(datosBackup, null, 4)};`;
            
            const blob = new Blob([contenidoArchivo], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_sistema_${new Date().toISOString().split('T')[0]}.js`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            Swal.fire('Copia de Seguridad', 'Se ha descargado el archivo JS con tus datos.', 'success');
        }
    </script>
</body>
</html>
